<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Démo Juice - Cartes qui disparaissent</title>
    <style>
        body {
            margin: 0; background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: white; font-family: sans-serif;
        }
        canvas { border: 4px solid #333; background-color: #000; cursor: default; }
        .instructions { position: absolute; top: 10px; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

    <div class="instructions">
        Clique sur une carte : elle disparaît instantanément pour laisser place aux lignes de vitesse !
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 600;

const STATES = { PLAYING: 0, TRANSITION: 1, MENU: 2, SELECTED: 3 };
let currentState = STATES.PLAYING;
let mouseX = 0, mouseY = 0, frameCount = 0;
let particles = [], cards = [], speedLines = [];
let selectionTimer = 0, selectedColor = "#fff";

const RAINBOW_COLORS = ['#ff4444', '#ffaa44', '#ffee44', '#44ff44', '#44aaff', '#aa44ff'];

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `${r}, ${g}, ${b}`;
}

/**
 * CLASSE SPEED LINE
 */
class SpeedLine {
    constructor(color) {
        this.colorRgb = hexToRgb(color);
        this.reset();
    }
    reset() {
        const margin = canvas.width * 0.2;
        this.x = Math.random() < 0.5 ? Math.random() * margin : (canvas.width - margin) + (Math.random() * margin);
        this.y = -Math.random() * canvas.height;
        this.length = Math.random() * 300 + 100;
        this.speed = Math.random() * 40 + 30;
        this.width = Math.random() * 3 + 1;
    }
    update() {
        this.y += this.speed;
        if (this.y > canvas.height) this.reset();
    }
    draw(ctx, lineOpacity = 1) {
        let fadeZone = 120;
        let edgeAlpha = 1.0;
        
        if (this.y < fadeZone) edgeAlpha = this.y / fadeZone;
        else if (this.y + this.length > canvas.height - fadeZone) edgeAlpha = (canvas.height - (this.y + this.length)) / fadeZone;
        
        edgeAlpha = Math.max(0, Math.min(1, edgeAlpha));

        ctx.strokeStyle = `rgba(${this.colorRgb}, ${edgeAlpha * lineOpacity * 0.8})`;
        ctx.lineWidth = this.width;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x, this.y + this.length);
        ctx.stroke();
    }
}

/**
 * CLASSE PARTICULE
 */
class PixelParticle {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.size = Math.floor(Math.random() * 4) + 4;
        this.color = RAINBOW_COLORS[Math.floor(Math.random() * RAINBOW_COLORS.length)];
        this.vx = (Math.random() - 0.5) * 12;
        this.vy = (Math.random() - 0.5) * 12;
        this.life = 1.0; this.decay = Math.random() * 0.02 + 0.01;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vy += 0.1; this.life -= this.decay; }
    draw(ctx) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(Math.floor(this.x), Math.floor(this.y), this.size, this.size);
        ctx.globalAlpha = 1;
    }
}

/**
 * CLASSE CARD
 */
class ChoiceCard {
    constructor(id, label, tier) {
        this.id = id; this.label = label; this.tier = tier;
        this.width = 180; this.height = 250; this.spacing = 220;
        this.targetX = (canvas.width / 2 - this.width / 2) + (id - 1) * this.spacing;
        this.targetY = canvas.height / 2 - this.height / 2;
        this.y = canvas.height + 100;
        this.timer = 0; this.delay = id * 10;
        this.velY = 0; this.stiffness = 0.1; this.damping = 0.7;
        this.isHovered = false; this.scale = 1;
        this.color = (tier === 1) ? "#3498db" : (tier === 2) ? "#9b59b6" : "#f1c40f";
    }
    update(mX, mY) {
        if (this.timer < this.delay) { this.timer++; return; }
        let force = (this.targetY - this.y) * this.stiffness;
        this.velY += force; this.velY *= this.damping;
        this.y += this.velY;
        this.isHovered = (mX > this.targetX && mX < this.targetX + this.width && mY > this.y && mY < this.y + this.height);
        let targetScale = this.isHovered ? 1.05 : 1;
        this.scale += (targetScale - this.scale) * 0.2;
    }
    draw(ctx) {
        if (this.timer < this.delay) return;
        ctx.save();
        ctx.translate(this.targetX + this.width/2, this.y + this.height/2);
        ctx.scale(this.scale, this.scale);
        if(this.isHovered) {
            ctx.scale(1, 0.98); 
            ctx.shadowColor = "rgba(255, 100, 0, 0.6)";
            ctx.shadowBlur = 24; ctx.shadowOffsetY = 12;
        }
        if (this.tier === 3) {
            let grad = ctx.createRadialGradient(0, 0, 10, 0, 0, this.height);
            grad.addColorStop(0, '#6c1212'); grad.addColorStop(1, '#2a0a0a');
            ctx.fillStyle = grad;
        } else { ctx.fillStyle = "#222"; }
        ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
        ctx.lineWidth = (this.tier === 3) ? 6 : 4;
        ctx.strokeStyle = this.color;
        ctx.strokeRect(-this.width/2, -this.height/2, this.width, this.height);
        ctx.shadowBlur = 0; ctx.fillStyle = "#fff";
        ctx.font = "bold 16px monospace"; ctx.textAlign = "center";
        ctx.fillText(this.label, 0, -this.height/2 + 40);
        ctx.fillText("TIER " + this.tier, 0, this.height/2 - 20);
        ctx.restore();
    }
}

function initMenu() {
    cards = [new ChoiceCard(0, "VITESSE +", 1), new ChoiceCard(1, "DEGATS ++", 2), new ChoiceCard(2, "ULTIME", 3)];
}

function initSpeedLines(color) {
    speedLines = [];
    for(let i = 0; i < 60; i++) speedLines.push(new SpeedLine(color));
}

/**
 * BOUCLE PRINCIPALE
 */
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frameCount++;

    if (currentState === STATES.PLAYING) {
        let bounce = Math.sin(frameCount * 0.1) * 10;
        ctx.fillStyle = RAINBOW_COLORS[Math.floor(frameCount / 10) % RAINBOW_COLORS.length];
        ctx.fillRect(canvas.width/2 - 16, canvas.height/2 - 16 + bounce, 32, 32);
    } else if (currentState === STATES.TRANSITION) {
        particles.forEach((p, i) => { p.update(); p.draw(ctx); if (p.life <= 0) particles.splice(i, 1); });
        if (particles.length < 5) { currentState = STATES.MENU; initMenu(); }
    } else if (currentState === STATES.MENU) {
        // Fond sombre
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0,0, canvas.width, canvas.height);
        // Les cartes ne sont dessinées QUE dans cet état
        cards.forEach(c => { c.update(mouseX, mouseY); c.draw(ctx); });
    } else if (currentState === STATES.SELECTED) {
        
        // --- RENDU DU BACKGROUND ---
        // On met un fond noir total pour un meilleur contraste avec les lignes
        ctx.fillStyle = "#000";
        ctx.fillRect(0,0, canvas.width, canvas.height);
        
        // NOTE : On ne boucle plus sur "cards.forEach(c => c.draw(ctx));" ici.
        // Les cartes disparaissent donc immédiatement au clic.

        // --- GESTION DU FONDU DES LIGNES ---
        let fadeDuration = 50; 
        let lineOpacity = 1;

        if (selectionTimer < fadeDuration) {
            lineOpacity = selectionTimer / fadeDuration; 
        }

        speedLines.forEach(line => { 
            line.update(); 
            line.draw(ctx, lineOpacity); 
        });

        selectionTimer--;
        if (selectionTimer <= 0) {
            currentState = STATES.PLAYING;
            cards = []; speedLines = [];
        }
    }
    requestAnimationFrame(loop);
}

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top;
});

canvas.addEventListener('mousedown', () => {
    if (currentState === STATES.PLAYING) {
        for(let i=0; i<50; i++) particles.push(new PixelParticle(canvas.width/2, canvas.height/2));
        currentState = STATES.TRANSITION;
    } else if (currentState === STATES.MENU) {
        const clickedCard = cards.find(c => c.isHovered);
        if(clickedCard) {
            selectedColor = clickedCard.color;
            selectionTimer = 100; 
            initSpeedLines(clickedCard.color);
            currentState = STATES.SELECTED;
        }
    }
});

loop();
</script>
</body>
</html>
