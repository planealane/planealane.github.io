<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Démo Juice - Manga Tunnel Coloré</title>
    <style>
        body {
            margin: 0; background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: white; font-family: sans-serif;
        }
        canvas { border: 4px solid #333; background-color: #000; cursor: default; }
        .instructions { position: absolute; top: 10px; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

    <div class="instructions">
        Clique pour l'explosion, puis choisis une upgrade pour l'effet Manga coloré !
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 600;

// Machine d'état
const STATES = { PLAYING: 0, TRANSITION: 1, MENU: 2, SELECTED: 3 };
let currentState = STATES.PLAYING;

// Variables globales
let mouseX = 0, mouseY = 0;
let particles = [];
let cards = [];
let speedLines = [];
let frameCount = 0;
let selectionTimer = 0;
let selectedColor = "#fff";

// Couleurs "Arc-en-ciel" pour les pixels de fond
const RAINBOW_COLORS = ['#ff4444', '#ffaa44', '#ffee44', '#44ff44', '#44aaff', '#aa44ff'];

/**
 * FONCTION UTILITAIRE : Convertit Hex en RGB
 * Nécessaire pour appliquer l'alpha sur une couleur spécifique dans Canvas
 */
function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `${r}, ${g}, ${b}`;
}

/**
 * CLASSE SPEED LINE (AVEC COULEUR DYNAMIQUE ET FONDU)
 */
class SpeedLine {
    constructor(color) {
        this.colorRgb = hexToRgb(color); // On stocke la version RGB pour l'alpha
        this.reset();
    }

    reset() {
        const margin = canvas.width * 0.2; // 20% du bord
        
        // Pile ou face : à gauche ou à droite ?
        if (Math.random() < 0.5) {
            this.x = Math.random() * margin; // Zone gauche
        } else {
            this.x = (canvas.width - margin) + (Math.random() * margin); // Zone droite
        }

        this.y = -Math.random() * canvas.height;
        this.length = Math.random() * 300 + 100; // Longueur aléatoire
        this.speed = Math.random() * 40 + 30;    // Vitesse élevée
        this.width = Math.random() * 3 + 1;     // Épaisseur variable
    }

    update() {
        this.y += this.speed;
        // Reset quand la ligne sort par le bas
        if (this.y > canvas.height) {
            this.reset();
        }
    }

    draw(ctx, globalOpacity = 1) {
        // --- CALCUL DU FONDU INDIVIDUEL (HAUT/BAS) ---
        let fadeZone = 150; // Zone de transition en pixels
        let lineAlpha = 1.0;

        if (this.y < fadeZone) {
            lineAlpha = this.y / fadeZone; // Apparition
        } else if (this.y + this.length > canvas.height - fadeZone) {
            lineAlpha = (canvas.height - (this.y + this.length)) / fadeZone; // Disparition
        }

        // Sécurité pour l'alpha
        lineAlpha = Math.max(0, lineAlpha);

        // --- DESSIN AVEC COULEUR ET ALPHA ---
        // On combine l'alpha individuel, l'opacité globale de sortie, et une intensité de base (0.9)
        const finalAlpha = lineAlpha * globalOpacity * 0.9;
        ctx.strokeStyle = `rgba(${this.colorRgb}, ${finalAlpha})`;
        ctx.lineWidth = this.width;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x, this.y + this.length);
        ctx.stroke();
    }
}

/**
 * CLASSE PARTICULE (EFFET D'EXPLOSION)
 */
class PixelParticle {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.size = Math.floor(Math.random() * 4) + 4;
        this.color = RAINBOW_COLORS[Math.floor(Math.random() * RAINBOW_COLORS.length)];
        this.vx = (Math.random() - 0.5) * 12;
        this.vy = (Math.random() - 0.5) * 12;
        this.life = 1.0;
        this.decay = Math.random() * 0.02 + 0.01;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vy += 0.1; this.life -= this.decay; }
    draw(ctx) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(Math.floor(this.x), Math.floor(this.y), this.size, this.size);
        ctx.globalAlpha = 1;
    }
}

/**
 * CLASSE CHOICE CARD (UPGRADES)
 */
class ChoiceCard {
    constructor(id, label, tier) {
        this.id = id;
        this.label = label;
        this.tier = tier;
        this.width = 180;
        this.height = 250;
        this.spacing = 220;
        
        // Coordonnées cibles (centre de l'écran)
        this.targetX = (canvas.width / 2 - this.width / 2) + (id - 1) * this.spacing;
        this.targetY = canvas.height / 2 - this.height / 2;
        
        // Départ hors écran (bas)
        this.y = canvas.height + 100;
        this.timer = 0;
        this.delay = id * 10; // Arrivée séquencée
        
        // Physique (Effet ressort)
        this.velY = 0;
        this.stiffness = 0.1;
        this.damping = 0.7;
        
        // État Hover / Animation
        this.isHovered = false;
        this.scale = 1;
        
        // Couleur définie par le Tier
        this.color = (tier === 1) ? "#3498db" : (tier === 2) ? "#9b59b6" : "#f1c40f";
    }

    update(mX, mY) {
        if (this.timer < this.delay) { this.timer++; return; }
        
        // Physique de ressort pour l'entrée
        let force = (this.targetY - this.y) * this.stiffness;
        this.velY += force;
        this.velY *= this.damping;
        this.y += this.velY;

        // Détection Hover (Zone de la carte actuelle)
        this.isHovered = (mX > this.targetX && mX < this.targetX + this.width &&
                         mY > this.y && mY < this.y + this.height);
        
        // Transition douce du scale (Interpolation linéaire)
        let targetScale = this.isHovered ? 1.05 : 1;
        this.scale += (targetScale - this.scale) * 0.2;
    }

    draw(ctx) {
        if (this.timer < this.delay) return;
        ctx.save();
        
        // Transformations (Position, Échelle, et légère inclinaison perspective)
        ctx.translate(this.targetX + this.width/2, this.y + this.height/2);
        ctx.scale(this.scale, this.scale);
        if(this.isHovered) {
            ctx.scale(1, 0.98); // Écrase légèrement pour simuler rotateX
            
            // Lueur orangée intense au survol
            ctx.shadowColor = "rgba(255, 100, 0, 0.6)";
            ctx.shadowBlur = 24;
            ctx.shadowOffsetY = 12;
        }

        // Fond de la carte
        if (this.tier === 3) {
            // Fond spécial dégradé radial pour Tier 3
            let grad = ctx.createRadialGradient(0, 0, 10, 0, 0, this.height);
            grad.addColorStop(0, '#6c1212');
            grad.addColorStop(1, '#2a0a0a');
            ctx.fillStyle = grad;
        } else {
            ctx.fillStyle = "#222"; // Fond standard
        }
        
        ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
        
        // Bordure colorée selon le Tier
        ctx.lineWidth = (this.tier === 3) ? 6 : 4;
        ctx.strokeStyle = this.color;
        ctx.strokeRect(-this.width/2, -this.height/2, this.width, this.height);

        // Texte (On désactive l'ombre pour la netteté)
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#fff";
        ctx.font = "bold 16px monospace";
        ctx.textAlign = "center";
        ctx.fillText(this.label, 0, -this.height/2 + 40);
        ctx.fillText("TIER " + this.tier, 0, this.height/2 - 20);
        
        ctx.restore();
    }
}

/**
 * INITIALISATION DU MENU
 */
function initMenu() {
    cards = [
        new ChoiceCard(0, "VITESSE +", 1),
        new ChoiceCard(1, "DEGATS ++", 2),
        new ChoiceCard(2, "ULTIME", 3)
    ];
}

/**
 * INITIALISATION DES LIGNES DE VITESSE (AVEC COULEUR CIBLE)
 */
function initSpeedLines(color) {
    speedLines = [];
    // On crée 60 lignes concentrées sur les bords
    for(let i = 0; i < 60; i++) {
        speedLines.push(new SpeedLine(color));
    }
}

/**
 * BOUCLE DE RENDU PRINCIPALE
 */
function loop() {
    // Nettoyage complet du canvas à chaque frame
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frameCount++;

    if (currentState === STATES.PLAYING) {
        // --- ÉTAT : JEU EN COURS ---
        // Simple balle flottante qui change de couleur
        let bounce = Math.sin(frameCount * 0.1) * 10;
        ctx.fillStyle = RAINBOW_COLORS[Math.floor(frameCount / 10) % RAINBOW_COLORS.length];
        ctx.fillRect(canvas.width/2 - 16, canvas.height/2 - 16 + bounce, 32, 32);
        
    } else if (currentState === STATES.TRANSITION) {
        // --- ÉTAT : TRANSITION (EXPLOSION) ---
        // Mise à jour et dessin des particules
        particles.forEach((p, i) => {
            p.update(); p.draw(ctx);
            // Suppression des particules mortes
            if (p.life <= 0) particles.splice(i, 1);
        });
        // Quand l'explosion est finie, on passe au menu
        if (particles.length < 5) { 
            currentState = STATES.MENU; 
            initMenu(); 
        }

    } else if (currentState === STATES.MENU) {
        // --- ÉTAT : MENU DE SÉLECTION ---
        // Fond obscurci pour faire ressortir les cartes
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0,0, canvas.width, canvas.height);
        
        // Mise à jour et dessin des cartes
        cards.forEach(c => {
            c.update(mouseX, mouseY);
            c.draw(ctx);
        });

    } else if (currentState === STATES.SELECTED) {
        // --- ÉTAT : AMÉLIORATION SÉLECTIONNÉE (EFFET MANGA) ---
        
        // 1. Calcul du fondu global de sortie (sur les 15 dernières frames)
        let globalOpacity = 1;
        if (selectionTimer < 15) {
            globalOpacity = selectionTimer / 15;
        }

        // 2. Fond noir total (avec fondu global)
        ctx.fillStyle = "#000";
        ctx.globalAlpha = globalOpacity;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 3. Flash d'ambiance de la couleur sélectionnée (très subtil)
        ctx.fillStyle = selectedColor;
        ctx.globalAlpha = globalOpacity * 0.15; // Opacité max 15%
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1; // Reset globalAlpha pour le reste

        // 4. Dessin des lignes de vitesse colorées
        speedLines.forEach(line => {
            line.update();
            line.draw(ctx, globalOpacity); // On passe l'opacité globale
        });

        // 5. Gestion du chrono de l'effet
        selectionTimer--;
        if (selectionTimer <= 0) {
            // Retour au jeu et nettoyage
            currentState = STATES.PLAYING;
            cards = [];
            speedLines = [];
        }
    }
    // Rappel de la boucle à la frame suivante
    requestAnimationFrame(loop);
}

// --- GESTION DES ÉVÉNEMENTS ---

// Suivi de la position de la souris
canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
});

// Clic de souris
canvas.addEventListener('mousedown', () => {
    if (currentState === STATES.PLAYING) {
        // Déclencher l'explosion de transition
        for(let i=0; i<50; i++) {
            particles.push(new PixelParticle(canvas.width/2, canvas.height/2));
        }
        currentState = STATES.TRANSITION;
        
    } else if (currentState === STATES.MENU) {
        // Vérifier si une carte a été cliquée
        const clickedCard = cards.find(c => c.isHovered);
        if(clickedCard) {
            // Activer l'effet Manga coloré
            selectedColor = clickedCard.color; // On stocke la couleur pour le flash
            selectionTimer = 50; // Durée de l'effet (~0.8s)
            
            // Initialisation des lignes AVEC la couleur de la carte
            initSpeedLines(clickedCard.color);
            
            currentState = STATES.SELECTED;
        }
    }
});

// Lancement de la boucle
loop();
</script>
</body>
</html>
